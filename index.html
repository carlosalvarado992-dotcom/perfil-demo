<!DOCTYPE html>
<html>
<head>
    <title>Perfil Demo</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
        }

        .card {
            max-width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        img {
            width: 100px;
            border-radius: 50%;
            margin-top: -60px;
            border: 4px solid white;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            color: gray;
        }

        .skills {
            text-align: left;
            margin-top: 15px;
        }

        .skills li {
            margin-bottom: 5px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #667eea;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="card">

    <img src="avatar.png">

    <h1>Usuario Demo</h1>
    <p>Explorando el desarrollo web 🚀</p>

    <div class="skills">
        <h3>Habilidades</h3>
        <ul>
            <li>HTML básico</li>
            <li>CSS básico</li>
            <li>Aprendizaje continuo</li>
        </ul>
    </div>

    <a href="#" class="btn">Proyecto en progreso</a>

</div>

</body>
</html>
